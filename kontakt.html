<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavárna Retro | Kontakt a Mapa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo">Kavárna<span>Retro</span></a>
            <ul class="navbar__menu">
                <li><a href="index.html">Domů</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="kontakt.html">Kde nás najdete</a></li>
            </ul>
        </div>
    </nav>

    <header class="menu-header">
        <h1>Najdete nás zde</h1>
    </header>

    <main class="container">
        <section class="contact-page">
            <div class="contact-grid">
                
                <div class="contact-info">
                    <h2 class="section-title" style="text-align: left; font-size: 2.2rem; margin-bottom: 30px;">Kontaktní údaje</h2>
                    
                    <div class="contact-item">
                        <i class="fas fa-location-dot"></i>
                        <div>
                            <h3>Adresa</h3>
                            <p>Ulice Kávová 123, 110 00 Praha 1</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h3>Rezervace</h3>
                            <p>+420 777 123 456</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h3>E-mail</h3>
                            <p>info@kavarnaretro.cz</p>
                        </div>
                    </div>

                    <div class="social-links">
                        <h3>Sledujte nás</h3>
                        <div class="social-icons">
                            <a href="#"><i class="fab fa-instagram"></i></a>
                            <a href="#"><i class="fab fa-facebook-f"></i></a>
                            <a href="#"><i class="fab fa-tiktok"></i></a>
                        </div>
                    </div>
                </div>

                <div class="contact-map">
                    <iframe 
                        src="https://www.google.com/maps/@49.2349227,17.6804565,14z?entry=ttu&g_ep=EgoyMDI2MDMzMS4wIKXMDSoASAFQAw%3D%3D" 
                        width="100%" 
                        height="450" 
                        style="border:0; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>

            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <h3 style="color: var(--gold); margin-bottom: 20px;">Kavárna Retro</h3>
            <p>© 2026 Všechna práva vyhrazena</p>
        </div>
    </footer>

</body>
</html>
